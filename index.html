<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE 2 Торговый Эксперт</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen p-4">

    <div class="w-full max-w-4xl bg-[#1e1e1e] rounded-2xl p-6 shadow-xl border border-[#2d2d2d] mt-4">
        <h1 class="text-3xl font-bold text-amber-500 text-center mb-6">PoE 2 Торговый Эксперт</h1>

        <div class="bg-[#252526] border border-[#333334] rounded-xl p-4 mb-6">
            <h2 class="text-sm font-semibold text-amber-400 mb-3 uppercase tracking-wider">1. Актуальные курсы валют</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">1 Divine = ... Exalt</label>
                    <input type="number" id="divEx" value="600" step="any" class="w-full bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">1 Chaos = ... Exalt</label>
                    <input type="number" id="chaosEx" value="69" step="any" class="w-full bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">1 Divine = ... Chaos</label>
                    <input type="number" id="divChaos" value="8.28" step="any" class="w-full bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-[#1a1a1a] border border-[#2d2d2d] rounded-xl p-4 flex flex-col justify-between">
                <div>
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="text-2xl">🛒</span>
                        <h2 class="text-lg font-bold text-blue-400">Покупка Divane</h2>
                    </div>                                  
                    <div class="mb-4">
                        <label class="block text-xs text-gray-400 mb-1">Количество Divine</label>
                        <input type="number" id="buyTargetPrice" value="1.0" step="any" class="w-full bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>

                <div>
                    <button onclick="calculateBuy()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-4 rounded-xl transition mb-4">Рассчитать покупку</button>
                    <div class="bg-[#252526] border border-[#333334] rounded-xl p-3 min-h-[140px]">
                        <pre id="buyResult" class="whitespace-pre-wrap text-xs text-gray-300 font-sans">Нажмите кнопку выше для расчета</pre>
                    </div>
                </div>
            </div>

            <div class="bg-[#1a1a1a] border border-[#2d2d2d] rounded-xl p-4 flex flex-col justify-between">
                <div>
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="text-2xl">💰</span>
                        <h2 class="text-lg font-bold text-green-400">Прожада дробных цен Divine</h2>
                    </div>
                    <p class="text-xs text-gray-400 mb-4">Вы продаете предмет. Твоя цель — получить чистые Divine. В чем выгоднее принять оплату от покупателя?</p>
                    
                    <div class="mb-4">
                        <label class="block text-xs text-gray-400 mb-1">Твоя цена за предмет (в Divine)</label>
                        <input type="number" id="sellTargetPrice" value="1.5" step="any" class="w-full bg-[#2d2d2d] border border-[#3d3d3d] rounded-lg px-3 py-2 text-white focus:outline-none focus:border-green-500">
                    </div>
                </div>

                <div>
                    <button onclick="calculateSell()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-2.5 px-4 rounded-xl transition mb-4">Рассчитать продажу</button>
                    <div class="bg-[#252526] border border-[#333334] rounded-xl p-3 min-h-[140px]">
                        <pre id="sellResult" class="whitespace-pre-wrap text-xs text-gray-300 font-sans">Нажмите кнопку выше для расчета</pre>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Функция получения общих курсов
        function getRates() {
            return {
                divEx: parseFloat(document.getElementById('divEx').value),
                chaosEx: parseFloat(document.getElementById('chaosEx').value),
                divChaos: parseFloat(document.getElementById('divChaos').value)
            };
        }

        // КОЛОНКА 1: ЛОГИКА ПОКУПКИ
        function calculateBuy() {
            const rates = getRates();
            const targetDiv = parseFloat(document.getElementById('buyTargetPrice').value);
            const resBox = document.getElementById('buyResult');

            if (Object.values(rates).some(isNaN) || isNaN(targetDiv)) {
                resBox.innerHTML = "<span class='text-red-400'>Ошибка ввода чисел!</span>";
                return;
            }

            // Вариант 1: Прямо в экзах
            const costDirectEx = targetDiv * rates.divEx;
            // Вариант 2: Перевести экзы в хаосы, купить за хаосы
            const costViaChaos = targetDiv * rates.divChaos * rates.chaosEx;

            let report = `🎯 Цель: купить на сумму ${targetDiv} Div\n\n`;
            report += `🔹 Способ А (Напрямую в Ex): ${costDirectEx.toFixed(2)} экзов\n`;
            report += `🔹 Способ Б (Через Chaos): ${costViaChaos.toFixed(2)} экзов\n\n`;

            if (costDirectEx < costViaChaos) {
                const diff = costViaChaos - costDirectEx;
                report += `💡 <span class="text-blue-400 font-semibold">ВЕРДИКТ: Плати НАПРЯМУЮ в Exalts!</span>\n Сэкономишь ${diff.toFixed(2)} экзов.`;
            } else if (costViaChaos < costDirectEx) {
                const diff = costDirectEx - costViaChaos;
                report += `💡 <span class="text-blue-400 font-semibold">ВЕРДИКТ: Переведи Ex в Chaos и плати хаосами!</span>\n Сэкономишь ${diff.toFixed(2)} экзов.`;
            } else {
                report += `💡 ВЕРДИКТ: Способы равноценны.`;
            }

            resBox.innerHTML = report;
        }

        // КОЛОНКА 2: ЛОГИКА ПРОДАЖИ
        function calculateSell() {
            const rates = getRates();
            const targetDiv = parseFloat(document.getElementById('sellTargetPrice').value);
            const resBox = document.getElementById('sellResult');

            if (Object.values(rates).some(isNaN) || isNaN(targetDiv)) {
                resBox.innerHTML = "<span class='text-red-400'>Ошибка ввода чисел!</span>";
                return;
            }

            // Сколько экзов получим, если нам заплатят "эквивалент в экзах" напрямую
            const receiveDirectEx = targetDiv * rates.divEx;
            
            // Сколько экзов мы получим суммарно, если нам заплатят хаосами, а мы их сдадим в экзы
            const receiveViaChaos = (targetDiv * rates.divChaos) * rates.chaosEx;

            let report = `🎯 Цель: получить ценность ${targetDiv} Div\n\n`;
            report += `🔸 Если взять оплату в EX: получишь ${receiveDirectEx.toFixed(2)} экзов\n`;
            report += `🔸 Если взять оплату в CHAOS (и перевести в Ex): получишь ${receiveViaChaos.toFixed(2)} экзов\n\n`;

            if (receiveDirectEx > receiveViaChaos) {
                const diff = receiveDirectEx - receiveViaChaos;
                report += `💡 <span class="text-green-400 font-semibold">ВЕРДИКТ: Требуй оплату только в EXALTS!</span>\n Это выгоднее на ${diff.toFixed(2)} экзов.`;
            } else if (receiveViaChaos > receiveDirectEx) {
                const diff = receiveViaChaos - receiveDirectEx;
                report += `💡 <span class="text-green-400 font-semibold">ВЕРДИКТ: Требуй оплату в CHAOS, а потом меняй на Ex!</span>\n Выиграешь +${diff.toFixed(2)} экзов чистыми.`;
            } else {
                report += `💡 ВЕРДИКТ: Без разницы, суммы равны.`;
            }

            resBox.innerHTML = report;
        }
    </script>
</body>
</html>
